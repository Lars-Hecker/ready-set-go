syntax = "proto3";
package workspace;
option go_package = "baseapp/gen/api/workspace;workspacepb";

enum Role {
  ROLE_UNSPECIFIED = 0;
  ROLE_PRIMARY_OWNER = 1;
  ROLE_OWNER = 2;
  ROLE_ADMIN = 3;
  ROLE_MEMBER = 4;
  ROLE_GUEST = 5;
}

enum MembershipStatus {
  MEMBERSHIP_STATUS_UNSPECIFIED = 0;
  MEMBERSHIP_STATUS_INVITED = 1;
  MEMBERSHIP_STATUS_ACTIVE = 2;
  MEMBERSHIP_STATUS_REJECTED = 3;
  MEMBERSHIP_STATUS_DISABLED = 4;
  MEMBERSHIP_STATUS_REMOVED = 5;
}

message Workspace {
  string id = 1;
  string name = 2;
  string slug = 3;
  bool is_active = 4;
  int64 created_at = 5;
  int64 updated_at = 6;
}

message Membership {
  string id = 1;
  string user_id = 2;
  string workspace_id = 3;
  Role role = 4;
  MembershipStatus status = 5;
  int64 created_at = 6;
  int64 updated_at = 7;
}

message MemberInfo {
  string membership_id = 1;
  string user_id = 2;
  string name = 3;
  string email = 4;
  string avatar_url = 5;
  Role role = 6;
  MembershipStatus status = 7;
}

// Workspace CRUD

message CreateWorkspaceRequest {
  string name = 1;
  string slug = 2;
}

message CreateWorkspaceResponse {
  Workspace workspace = 1;
  Membership membership = 2;
}

message GetWorkspaceRequest {
  string workspace_id = 1;
}

message GetWorkspaceResponse {
  Workspace workspace = 1;
  Membership my_membership = 2;
}

message UpdateWorkspaceRequest {
  string workspace_id = 1;
  optional string name = 2;
  optional string slug = 3;
}

message UpdateWorkspaceResponse {
  Workspace workspace = 1;
}

message DeleteWorkspaceRequest {
  string workspace_id = 1;
}

message DeleteWorkspaceResponse {}

message ListWorkspacesRequest {}

message ListWorkspacesResponse {
  repeated Workspace workspaces = 1;
}

// Membership management

message ListMembersRequest {
  string workspace_id = 1;
}

message ListMembersResponse {
  repeated MemberInfo members = 1;
}

message UpdateMemberRoleRequest {
  string workspace_id = 1;
  string membership_id = 2;
  Role role = 3;
}

message UpdateMemberRoleResponse {
  Membership membership = 1;
}

message TransferOwnershipRequest {
  string workspace_id = 1;
  string new_owner_user_id = 2;
}

message TransferOwnershipResponse {
  Membership old_owner_membership = 1;
  Membership new_owner_membership = 2;
}

message RemoveMemberRequest {
  string workspace_id = 1;
  string membership_id = 2;
}

message RemoveMemberResponse {}

message LeaveWorkspaceRequest {
  string workspace_id = 1;
}

message LeaveWorkspaceResponse {}

service WorkspaceService {
  rpc CreateWorkspace(CreateWorkspaceRequest) returns (CreateWorkspaceResponse);
  rpc GetWorkspace(GetWorkspaceRequest) returns (GetWorkspaceResponse);
  rpc UpdateWorkspace(UpdateWorkspaceRequest) returns (UpdateWorkspaceResponse);
  rpc DeleteWorkspace(DeleteWorkspaceRequest) returns (DeleteWorkspaceResponse);
  rpc ListWorkspaces(ListWorkspacesRequest) returns (ListWorkspacesResponse);

  rpc ListMembers(ListMembersRequest) returns (ListMembersResponse);
  rpc UpdateMemberRole(UpdateMemberRoleRequest) returns (UpdateMemberRoleResponse);
  rpc TransferOwnership(TransferOwnershipRequest) returns (TransferOwnershipResponse);
  rpc RemoveMember(RemoveMemberRequest) returns (RemoveMemberResponse);
  rpc LeaveWorkspace(LeaveWorkspaceRequest) returns (LeaveWorkspaceResponse);
}
